spring.application.name=backend
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
ems.jwt.secret=${JWT_SECRET}
ems.jwt.expirationMs=${JWT_EXPIRATION_MS:86400000}

# CORS Configuration
ems.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5174,https://ems-gilt-one.vercel.app,https://ems-gilt-one.vercel.app/

# Server Port
server.port=${PORT:8080}

# Database Pooling
spring.datasource.hikari.maximum-pool-size=4
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.minimum-idle=1

# Email Configuration (Google SMTP)
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

